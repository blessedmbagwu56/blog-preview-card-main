<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Preview Card</title>
    <link href="style.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap"
      rel="stylesheet"
    />

    <link href="assets/images/favicon-32x32.png" rel="icon" />
  </head>

  <body>
    <article class="card">
      <img
        src="assets/images/illustration-article.svg"
        alt="design"
        class="main-img"
      />
      <div class="category">
        <p class="verb"><strong>Learning</strong></p>
        <time datetime="2023-12-21">Published 21 Dec 2023</time>

        <h1><a href="#">HTML & CSS Foundations</a></h1>
        <p>
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="author">
          <img
            src="assets/images/image-avatar.webp"
            alt="author"
            width="32"
          /><strong>Greg Hooper</strong>
        </div>
      </div>
    </article>
  </body>
</html>
